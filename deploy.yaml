apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-deployment1
  labels:
    app: custom
spec:
  replicas: 2
  selector:
    matchLabels:
      app: custom
  template:
    metadata:
      labels:
        app: custom
    spec:
      containers:
      - name: project
        image: nanav01/project2image1
        ports:
        - containerPort: 80
